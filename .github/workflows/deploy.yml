name: Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --name ticketmasterbot main.py
      - uses: actions/upload-artifact@v4
        with:
          name: ticketmasterbot-linux
          path: dist/ticketmasterbot
